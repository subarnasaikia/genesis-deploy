# Genesis full-stack deployment.
#
# Run from the repo root via ./scripts/deploy.sh, or manually:
#   docker compose -f docker/docker-compose.yml --env-file .env up -d --build
#
# Sources are checked out into ../sources/ by scripts/fetch-sources.sh.
# Each app is built with the Dockerfile maintained in its own repository.

name: genesis

# Cap container (json-file) log growth on every service. Docker's default
# json-file driver has no size limit, so stdout/stderr logs grow unbounded and
# eventually fill the host disk on a long-lived deploy. This holds each service
# to ~50 MB (5 rotated files x 10 MB), auto-pruned. Read live with
# `docker compose ... logs -f <service>`. (The backend ALSO writes a separate
# rolling file to ./logs/genesis.log, capped in its own logback config.)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-genesis}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    # Deliberately NOT published on the host — only the backend (same compose
    # network) can reach it. Add a `ports:` entry temporarily if you need
    # psql access from the host.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-genesis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  backend:
    build:
      context: ../sources/genesis-backend
      # Uses the Dockerfile maintained in the backend repo.
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-genesis}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-7d}
      # Storage provider: cloudinary (default) or local. See config/.env.example.
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-cloudinary}
      STORAGE_RETAIN_SOURCE: ${STORAGE_RETAIN_SOURCE:-true}
      STORAGE_LOCAL_BASE_PATH: ${STORAGE_LOCAL_BASE_PATH:-/app/data/uploads}
      # Cloudinary creds — required only when STORAGE_PROVIDER=cloudinary. Optional
      # here so the local provider can run without them; the backend logs a warning
      # if cloudinary is selected but left unconfigured.
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set in .env}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      # Persist the prod-profile rolling log file (logback writes
      # /app/logs/genesis.log, rotated daily) so logs survive rebuilds.
      - ../logs:/app/logs
      # Local storage provider (STORAGE_PROVIDER=local) writes uploads here.
      # Harmless with the default cloudinary provider — the dir just stays empty.
      - ../data/uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    logging: *default-logging

  frontend:
    build:
      context: ../sources/genesis-frontend
      # Uses the Dockerfile maintained in the frontend repo.
      args:
        # NEXT_PUBLIC_* values are inlined at build time by Next.js, so this
        # must be a build arg — runtime env would be ignored by the bundle.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must be set in .env}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
