site_name: Genesis Handbook
site_description: >-
  Architecture, functionality, and deployment documentation for the Genesis
  annotation platform.
repo_name: genesis-deploy
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - User Guide: user-guide.md
  - Repositories: repositories.md
  - Backend:
      - Architecture: backend/architecture.md
      - Functionality: backend/functionality.md
  - Frontend:
      - Architecture: frontend/architecture.md
      - Functionality: frontend/functionality.md
  - Deployment:
      - Setup: deployment/setup.md
      - Operations: deployment/operations.md
